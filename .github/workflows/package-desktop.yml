name: Package Windows desktop app

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-*"

jobs:
  windows:
    name: Build Windows app
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Tesseract OCR
        shell: pwsh
        run: choco install tesseract --no-progress -y
      - name: Build
        shell: pwsh
        run: .\scripts\build_windows_app.ps1
      - name: Zip app
        shell: pwsh
        run: Compress-Archive -Path "dist\Data Security Local.exe" -DestinationPath "dist\Data Security Local-windows.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: Data Security Local-windows
          path: dist/Data Security Local-windows.zip
